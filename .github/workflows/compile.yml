name: Compile Project

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CCACHE_DIR: ~/.cache/ccache
      CCACHE_MAXSIZE: 500M

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/compile.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install dependencies
        run: |
          if [ -d ~/apt-cache ] && [ "$(ls -A ~/apt-cache)" ]; then
            sudo cp -r ~/apt-cache/* /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ccache \
            qtcreator \
            qtbase5-dev \
            qt5-qmake \
            make \
            g++ \
            libgl1-mesa-dev \
            qtmultimedia5-dev \
            libqt5serialport5-dev \
            qttools5-dev-tools \
            qttools5-dev \
            libfftw3-dev \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi
          mkdir -p ~/apt-cache
          sudo cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true
          sudo chown -R $(whoami):$(whoami) ~/apt-cache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Set up ccache
        run: |
          mkdir -p ~/ccache-bin
          ln -s /usr/bin/ccache ~/ccache-bin/gcc
          ln -s /usr/bin/ccache ~/ccache-bin/g++
          ln -s /usr/bin/ccache ~/ccache-bin/cc
          ln -s /usr/bin/ccache ~/ccache-bin/c++
          ln -s /usr/bin/ccache ~/ccache-bin/arm-none-eabi-gcc
          ln -s /usr/bin/ccache ~/ccache-bin/arm-none-eabi-g++
          echo "$HOME/ccache-bin" >> $GITHUB_PATH

      - name: Show ccache stats (before)
        run: ccache -s

      - name: Prepare library directory
        run: |
          mkdir -p src/software/EMBO/lib/ubuntu_18
          ln -sf /usr/lib/x86_64-linux-gnu/libfftw3.a src/software/EMBO/lib/ubuntu_18/libfftw3.a

      - name: Compile PC Application
        run: |
          cd src/software/EMBO
          qmake EMBO.pro QMAKE_POST_LINK=""
          make -j$(nproc)

      - name: Compile Firmware for all targets
        run: |
          python3 scripts/compile_firmware.py

      - name: Show ccache stats (after)
        run: ccache -s

      - name: Package Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Package Firmware Binaries
          mkdir -p firmware
          find src/firmware/board \( -name "*.bin" -o -name "*.hex" \) -exec cp {} firmware/ \;
          zip -r embo-firmware.zip firmware

          # Package PC Application
          tar -czf EMBO-linux-x64.tar.gz -C src/software/EMBO/build/linux/release EMBO

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            embo-firmware.zip
            EMBO-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
