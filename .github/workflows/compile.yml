name: Compile Project

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qtcreator \
            qtbase5-dev \
            qt5-qmake \
            make \
            g++ \
            libgl1-mesa-dev \
            qtmultimedia5-dev \
            libqt5serialport5-dev \
            qttools5-dev-tools \
            qttools5-dev \
            libfftw3-dev \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi

      - name: Prepare library directory
        run: |
          mkdir -p src/software/EMBO/lib/ubuntu_18
          ln -sf /usr/lib/x86_64-linux-gnu/libfftw3.a src/software/EMBO/lib/ubuntu_18/libfftw3.a

      - name: Compile PC Application
        run: |
          cd src/software/EMBO
          qmake EMBO.pro
          sudo make -j$(nproc)

      - name: Compile Firmware for all targets
        run: |
          python3 scripts/compile_firmware.py

      - name: Package Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Package Firmware Binaries
          mkdir -p firmware
          find src/firmware/board \( -name "*.bin" -o -name "*.hex" \) -exec cp {} firmware/ \;
          zip -r embo-firmware.zip firmware

          # Package PC Application
          tar -czf EMBO-linux-x64.tar.gz -C src/software/EMBO/build/linux/release EMBO

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            embo-firmware.zip
            EMBO-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          arch: 'win64_mingw81'

      - name: Prepare library directory
        run: |
          New-Item -ItemType Directory -Force -Path src/software/EMBO/lib/win64
          Copy-Item -Path src/software/installer/packages/com.ctujakubparez.embo/data/libfftw3-3.dll -Destination src/software/EMBO/lib/win64/libfftw3-3.dll -Force
        shell: powershell

      - name: Compile qBreakpad
        run: |
          cd src/software/EMBO/__crashhandler/handler
          qmake handler.pro CONFIG+=release
          mingw32-make -j2
        shell: cmd

      - name: Copy qBreakpad library
        run: |
          Get-ChildItem -Path src/software/EMBO/__crashhandler/handler -Filter libqBreakpad.a -Recurse | Copy-Item -Destination src/software/EMBO/lib/win64/libqBreakpad.a -Force
        shell: powershell

      - name: Compile PC Application
        run: |
          cd src/software/EMBO
          qmake EMBO.pro CONFIG+=release
          mingw32-make -j2
        shell: cmd

      - name: Deploy Qt DLLs
        run: |
          cd src/software/EMBO/build-win64/release
          windeployqt EMBO.exe
        shell: cmd

      - name: Package Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          New-Item -ItemType Directory -Force -Path temp/EMBO
          Copy-Item -Path src/software/EMBO/build-win64/release/* -Destination temp/EMBO -Recurse -Force
          Compress-Archive -Path temp/EMBO -DestinationPath EMBO-win-x64.zip
        shell: powershell

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            EMBO-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
